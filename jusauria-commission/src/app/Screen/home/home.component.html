<app-nav></app-nav>

<div class="navSpace">
    <div id="carouselExampleIndicators" class="carousel slide ">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="../../../assets/1.png" class="carousel-image"  alt="...">
            </div>
            <div class="carousel-item">
                <img src="../../../assets/jgh.png" class="carousel-image" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
    
    <div class="container">
        <div class="row mt-4">
            <h1 class="h1 text-center text-bold" [ngClass]="{'commOpen': commStatusService.commState , 'commClosed': !commStatusService.commState}">
                {{ commStatusService.getCommStatusText() }}
            </h1>
        </div>
        <div class="row">
            <h2 class="col-12">Services</h2>
            <div class="row d-flex justify-content-center">
                @for(service of commStatusService.commServiceOffers; track service){
                    <div class="card col-md-5 mb-2 mb-md-5 me-md-5">
                        <div class="row">
                            <div class="col-4 col-md-3 d-flex align-items-start mt-3">
                                <img src="../../../assets/1.png" class="card-img" alt="...">
                            </div>
                            <div class="col-8 col-md-9">
                                <div class="card-body ">
                                    <h5 class="card-title">{{service.title}}</h5>
                                    <p class="card-text">{{service.description}}</p>
                                </div>
                            </div>
                            <div class="card-footer text-end">
                                <a href="./{{service.mainPage}}" class="btn btn-lilac">More Details ></a>
                            </div>
                        </div>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
